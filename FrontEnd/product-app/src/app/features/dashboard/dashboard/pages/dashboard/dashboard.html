<div class="min-h-screen bg-slate-100 lg:grid lg:grid-cols-[19rem_minmax(0,1fr)]">
  <app-dashboard-sidebar />

  <main class="flex min-h-screen flex-col bg-slate-50">
    <header class="dashboard-header border-b border-slate-200/80 bg-white/95 px-6 py-5 shadow-[0_1px_0_rgba(15,23,42,0.03)] backdrop-blur sm:px-8 lg:px-10">
      <div class="flex flex-col gap-6 xl:flex-row xl:items-center xl:justify-between">
        <div class="flex min-w-0 flex-col gap-5 md:flex-row md:items-center">

          <div class="min-w-0">
            <p class="text-xs font-semibold uppercase tracking-[0.3em] text-teal-600">Workspace overview</p>
            <div class="mt-2 flex flex-wrap items-center gap-3">
              <h1 class="break-words text-3xl font-semibold tracking-tight text-slate-900 sm:text-2xl">
                {{ userDisplayName() }}
              </h1>
              <span class="inline-flex rounded-full border border-teal-200 bg-teal-50 px-3 py-1 text-xs font-bold uppercase tracking-[0.16em] text-teal-600">
                {{ userRole() }}
              </span>
            </div>
          </div>
        </div>
        <div class="flex flex-col gap-3 xl:items-end">
          <button type="button" class="inline-flex w-fit items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-teal-300 hover:text-teal-700" (click)="logout()">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <path d="m16 17 5-5-5-5"></path>
              <path d="M21 12H9"></path>
            </svg>
            Logout
          </button>
        </div>
      </div>
    </header>

    <section class="flex-1 px-4 py-6 sm:px-6 lg:px-8">
      <div class="mx-auto flex w-full max-w-7xl flex-col gap-6">
        @if (hasVisibleFeatures()) {
          <section class="overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-[0_16px_50px_rgba(15,23,42,0.06)]">
            <router-outlet />
          </section>
        } @else {
          <div class="flex min-h-[24rem] items-center justify-center rounded-[28px] border border-dashed border-slate-300 bg-white px-6 py-10 text-center shadow-sm">
            <div class="max-w-lg">
              <h2 class="text-2xl font-semibold text-slate-900">No access available</h2>
              <p class="mt-3 text-sm leading-6 text-slate-600">
                Your account currently does not have any accessible workspace modules. Contact an administrator if you expect access.
              </p>
            </div>
          </div>
        }
      </div>
    </section>
  </main>
</div>
