<article
  class="stats-card overflow-hidden rounded-2xl border border-slate-200 bg-white p-5 shadow-[0_14px_35px_rgba(15,23,42,0.05)]"
  [class.stats-card--teal]="tone === 'teal'"
  [class.stats-card--blue]="tone === 'blue'"
  [class.stats-card--amber]="tone === 'amber'"
  [class.stats-card--rose]="tone === 'rose'"
  [class.stats-card--slate]="tone === 'slate'"
  [class.stats-card--violet]="tone === 'violet'"
>
  <div class="flex items-start justify-between gap-4">
    <div class="min-w-0">
      <p class="truncate text-xs font-bold uppercase tracking-[0.18em] text-slate-400">{{ title }}</p>
      <p class="mt-3 text-3xl font-semibold tracking-tight text-slate-900">
        @if (loading) {
          <span class="inline-block h-8 w-24 animate-pulse rounded-lg bg-slate-200"></span>
        } @else {
          {{ (value ?? 0) | number }}
        }
      </p>
      @if (subtitle) {
        <p class="mt-2 text-sm leading-5 text-slate-500">{{ subtitle }}</p>
      }
    </div>

    <div class="stats-card__icon grid h-10 w-10 shrink-0 place-items-center rounded-2xl">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 19V5"></path>
        <path d="M4 19h16"></path>
        <path d="M8 16V9"></path>
        <path d="M13 16V7"></path>
        <path d="M18 16v-4"></path>
      </svg>
    </div>
  </div>
</article>
