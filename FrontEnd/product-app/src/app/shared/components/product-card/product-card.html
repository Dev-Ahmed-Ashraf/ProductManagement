<div class="relative">
  <a [routerLink]="['/dashboard/products', product.id]" class="group flex h-full flex-col rounded-[20px] border border-slate-200 bg-white p-5 shadow-sm transition duration-200 hover:-translate-y-1 hover:border-teal-300 hover:shadow-[0_18px_40px_rgba(15,23,42,0.12)]">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <p class="text-xs font-semibold uppercase tracking-[0.22em] text-teal-600">Product #{{ product.id }}</p>
      <h3 class="mt-2 text-lg font-semibold text-slate-900 transition group-hover:text-teal-700 truncate">{{ product.name }}</h3>

      <div class="mt-2">
        <span [class]="statusConfig.color + ' px-2 py-1 rounded-full text-xs font-medium'">{{ statusConfig.label }}</span>
      </div>
    </div>

    <span class="absolute right-13 top-5 z-10 rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">
      Qty {{ product.quantity }}
    </span>
  </div>

  <p class="mt-4 line-clamp-3 text-sm leading-6 text-slate-600">
    {{ product.description || 'No description provided.' }}
  </p>

  <div class="mt-6 flex items-center justify-between border-t border-slate-100 pt-4">
    <div>
      <span class="block text-xs uppercase tracking-[0.18em] text-slate-400">Price</span>
      <strong class="text-xl font-bold text-slate-900">{{ product.price | currency }}</strong>
    </div>

    <span class="inline-flex items-center gap-2 text-sm font-semibold text-teal-700">
      View details
      <svg class="h-4 w-4 transition group-hover:translate-x-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14"></path>
        <path d="m12 5 7 7-7 7"></path>
      </svg>
    </span>
  </div>
</a>

  <button
    type="button"
    (click)="onDelete($event)"
    title="Delete product"
    class="absolute right-3 top-3 inline-flex items-center justify-center h-9 w-9 rounded-full border border-rose-200 bg-white text-rose-700 shadow-sm transition hover:bg-rose-50"
  >
    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14M10 11v5M14 11v5" />
    </svg>
  </button>
</div>
